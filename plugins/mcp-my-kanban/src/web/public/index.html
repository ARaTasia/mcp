<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <div class="header-left">
    <h1>Kanban<span>MCP</span></h1>
    <div class="ws-status">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">Connecting...</span>
    </div>
  </div>

  <div class="header-center">
    <div class="header-field">
      <span class="header-label" data-i18n="header.project">프로젝트</span>
      <div class="project-dropdown" id="projectDropdown">
        <button class="project-trigger" id="projectTrigger">
          <span class="project-trigger-text">전체</span>
          <svg class="project-trigger-arrow" width="12" height="12" viewBox="0 0 12 12"><path d="M3 5l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <div class="project-options" id="projectOptions">
          <!-- rendered by JS -->
        </div>
      </div>
      <button class="btn btn-danger project-delete-btn" id="deleteProjectBtn" style="display:none" data-i18n="header.delete">삭제</button>
    </div>

    <div class="header-field">
      <span class="header-label" data-i18n="header.tag">태그</span>
      <div class="tag-filters" id="tagFilters">
        <!-- rendered by JS -->
      </div>
    </div>

    <button class="btn btn-primary" id="newTaskBtn" data-i18n="header.newTask">+ 새 작업</button>
  </div>

  <div class="header-right">
    <button class="lang-toggle" id="langToggle">🌐 KO</button>
  </div>
</header>

<div class="board-wrap">
  <div class="board" id="board">
    <!-- columns rendered by JS -->
  </div>
</div>

<!-- Task Detail Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- Create Task Modal -->
<div class="modal-overlay" id="createTaskModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">새 작업 만들기</div>
      <button class="modal-close" id="createTaskClose">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group" id="modalProjectGroup">
        <label>프로젝트 *</label>
        <select id="newTaskProject"></select>
      </div>
      <div class="form-group">
        <label>제목 *</label>
        <input type="text" id="newTaskTitle" placeholder="작업 제목" />
      </div>
      <div class="form-group">
        <label>설명</label>
        <textarea id="newTaskDesc" rows="3" placeholder="작업 설명 (선택)"></textarea>
      </div>
      <div class="form-group">
        <label>담당자</label>
        <input type="text" id="newTaskAssignee" placeholder="에이전트 이름 (선택)" />
      </div>
      <div class="form-group">
        <label>태그 (쉼표 구분)</label>
        <input type="text" id="newTaskTags" placeholder="backend, frontend, db" />
      </div>
      <div class="form-group">
        <label>전제조건 Task ID (쉼표 구분)</label>
        <input type="text" id="newTaskPrereqs" placeholder="task_id1, task_id2" />
      </div>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn btn-ghost" id="createTaskCancel">취소</button>
        <button class="btn btn-primary" id="createTaskSubmit">만들기</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Project Confirmation Modal -->
<div class="modal-overlay" id="deleteProjectModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">프로젝트 삭제</div>
      <button class="modal-close" id="deleteProjectClose">&times;</button>
    </div>
    <div class="modal-body">
      <p id="deleteProjectMsg" style="font-size:13px;color:var(--text);line-height:1.6;margin-bottom:16px;"></p>
      <div id="deleteProjectTaskWarning" style="display:none;padding:10px 12px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);border-radius:var(--radius);margin-bottom:16px;">
        <p style="font-size:12px;color:var(--red);margin-bottom:4px;font-weight:500;">이 프로젝트에 작업이 있습니다.</p>
        <p style="font-size:12px;color:var(--text-muted);">삭제하면 모든 작업과 히스토리가 함께 삭제됩니다.</p>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-ghost" id="deleteProjectCancel">취소</button>
        <button class="btn btn-danger" id="deleteProjectConfirm">삭제</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
