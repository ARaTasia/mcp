name: Cross-Platform Test

on:
  push:
    branches: ['main']
    paths:
      - 'plugins/mcp-my-kanban/**'
      - '.github/workflows/cross-platform.yml'
  pull_request:
    paths:
      - 'plugins/mcp-my-kanban/**'
      - '.github/workflows/cross-platform.yml'

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/mcp-my-kanban

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify static files exist
        shell: bash
        run: |
          test -f dist/web/public/index.html && echo "index.html: PASS" || (echo "index.html: FAIL" && exit 1)
          test -f dist/web/public/app.js     && echo "app.js: PASS"     || (echo "app.js: FAIL"     && exit 1)
          test -f dist/web/public/style.css  && echo "style.css: PASS"  || (echo "style.css: FAIL"  && exit 1)

      - name: Verify MCP server starts
        shell: bash
        run: |
          # Run in background, capture stderr for diagnostics
          node dist/mcp-stdio.js 2>mcp_start.log &
          SERVER_PID=$!
          sleep 5
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "MCP START: PASS"
            kill $SERVER_PID
          else
            echo "MCP START: FAIL — server exited early"
            cat mcp_start.log
            exit 1
          fi

      - name: Verify npm pack contents
        shell: bash
        run: |
          npm pack --dry-run 2>&1 | grep "dist/web/public/index.html" \
            && echo "static files in package: PASS" \
            || (echo "static files in package: FAIL" && exit 1)
